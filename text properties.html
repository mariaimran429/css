<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEXT PROPERTIES</title>
    <style>
    /* Typography - font,size,weight,color for the whole page */
    body {
        background-color:cyan;
        color:white;
        font-family:Arial, sans-serif;
     }

     .hero-name {
        font-size:60px;
        font-weight:bold;
        color:yellow;
        text-shadow:3px 3px orange;
     }

     /* Typography + Text Transform - Tagline becomes Title Case */
     .tagline {
        font-size: italic ;
        color: lightblue;
        transform:Capitalize;
        line-height:2;
     }

     /* Text transform + Text Decoration - Secton headings in CAPS with underline */
     .label {
        text-transform: uppercase;
        text-decoration:underline;
        color:coral;
     }

     /* Typography - power stands out in bold green */
     .power {
        font-weight:bold;
        color:cyan;
     }

      /* Text transform + Text Decoration - Secton headings in CAPS with underline */
     .heading {
        text-transform: uppercase;
        text-decoration:underline;
        color:coral;
     }

     /* Text Decoration - weaknesses are crossed out */
     .weakness {
        text-decoration: line-through;
        color:grey;
     }

     /* Transform - the badge is titled to the side */
     .badge {
        font-size:28px;
        font-weight:bold;
        color:orange;
        transform:rotate(15deg)
     }

     /* Typography - footer text */
     .made-by {
        font-style:italic;
        color:olive;
     }



  </style>
    
<head>

<body>
    <h1 class ="hero-name"> THUNDER KID </h1>
    <P class="tagline">The most powerful hero in the school</P>
    <h2 class="label"> SUPER-POWERS</h2>
    <p class="power">can run fast like a cheetah </p>
    <p class="power">can lift a school bus</p>
    <h2 class="heading"> WEAKNESSES</h2>
    <p class="weakness"> Maths homework </p>
    <p class="weakness"> Brocoli </p>
    <p class="badge"> Top hero</p>
    <p class="made-by"> Created by _________ </p>

    

</body>

</html>
