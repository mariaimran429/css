<!DOCTYPE html>
<html>
    <head>
        <title> INTRODUCTION TO CSS </title>
        <style>
            /* universal selector--applies to everything*/
            * { 
                font-size :16px;
            }
            /* Element selectors*/
            body {
                background-color:light gray;
            }
            h1{
                color:darkblue;
            }
            h2{
                color:aqua;
            }
            
            p{
                color: purple;
            }
            /* Color Selector*/
            .my-detail {
                color:lightpink;
                font-weight: bold;
             }

             /* ID SELECTOR*/
             #my-card {
                background-color: blanchedalmond;
             }


        </style>
    </head>
    <body>

        <h1> MY COLOR CARD </h1>
        <p style="color: olive;"> Hi!This is my very own web page </p>

        <div id="my-card">

            <h2> About me </h2>
            <p class="my-detail"> My name is Maria </p>
            <p class="my-detail"> My favourite color is sky blue </p>
            <p class="my-detail"> My favourite subject is biology </p>
            <p class="my-detail"> My favourite food is pasta </p>
        </div>

        <h2> My favourite things </h2>
        <p> My favourite animal is dolphin </p>
        <p> My favourite sport is badminton </p>
        <p> My favourite movie is Lost in space </p>

    </body>
</html>
