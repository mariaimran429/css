<!DOCTYPE html>
<html>


<head>
   <!-- use actual width of page, dont pretend the page is wider -->
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Broken Layout</title>
   <!-- <link rel="stylesheet" href="mediaQueries.css"> -->
    <style>
        body{
   margin:0;
   font-family:Arial;
}


.header{
   background:#2c3e50;
   color:white;
   padding:20px;
}


.logo{
   font-size:28px;
   font-weight:bold;
   margin-right:120px;
}


.menu{
   display:inline-block;
}
.menu a{
   color:white;
   text-decoration:none;
   margin-right:20px;
}


/* 300 and 700 */
@media (min-width:300px) and (max-width:900px){
   .menu{
       background-color: red;
       display: block;
   }
}


@media (min-width:200px) and (max-width:550px){
   .menu a{
       display: block;
       font-size: 12px;
   }
   .logo{
       font-size: 18px;
   }
}
    </style>
</head>


<body>


   <div class="header">
       <span class="logo">My Website</span>
       <div class="menu">
           <a href="#">Home</a>
           <a href="#">About</a>
           <a href="#">Services</a>
           <a href="#">Gallery</a>
           <a href="#">Portfolio</a>
           <a href="#">Blog</a>
           <a href="#">Contact</a>
       </div>
   </div>


</body>


</html>
