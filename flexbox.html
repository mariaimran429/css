<html>


<head>
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <style>
       .logo{
           font-size: 30px;
           font-weight: bold;
       }
       .header {
           display: flex;
           justify-content: space-between;
           align-items: center;
           background: #2c3e50;
           color: white;
           padding: 20px;
       }
       a{
           text-decoration: none;
           color: white
       }


        @media (min-width: 200px) and (max-width: 550px) {
            .header{
               flex-direction: column;
               align-items: flex-start;
           }
           .menu{
               display: flex;
               flex-direction: column;
           }
       }
   </style>
</head>


<body>
   <div class="header">
       <span class="logo">My Website</span>
       <div class="menu">


           <a href="#">Home</a>
           <a href="#">About</a>

           <a href="#">Gallery</a>


       </div>
   </div>


</body>


</html>
